<!DOCTYPE html>
<html>
<head>
  <title>TikTok Callback</title>
</head>
<body>

  <h1>Login completado</h1>
  <p>Procesando autorización...</p>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
  
    if (code) {
      document.body.innerHTML += "<p><b>Code recibido:</b> " + code + "</p>";
    } else {
      document.body.innerHTML += "<p style='color:red'>No se recibió ningún code</p>";
    }
  </script>

</body>
</html>
